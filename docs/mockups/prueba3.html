<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel · CMMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Rubik:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#FFC22C;
    --yellow-light:#FFDA73;
    --yellow-dark:#E8A600;
    --ink:#141414;
    --white:#FFFFFF;
    --panel-w:460px;
    --wedge:96px; /* how much the top-left corner is inset */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    font-family:'Rubik', sans-serif;
    background:
      radial-gradient(circle at 30% 20%, #201d1a 0%, #0c0a09 55%, #050404 100%);
    color:var(--white);
    overflow:hidden;
    position:relative;
  }

  .bg-lines{
    position:fixed; inset:0;
    pointer-events:none;
    opacity:.05;
    background:repeating-linear-gradient(-18deg, transparent 0 38px, var(--white) 38px 40px);
    mask-image: radial-gradient(circle at 70% 40%, black, transparent 70%);
  }

  .hint{
    position:fixed; left:50%; top:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#6b665e;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    letter-spacing:.1em;
    font-size:14px;
    text-transform:uppercase;
    transition:opacity .4s ease;
    user-select:none;
  }
  .hint span{ display:block; font-size:11px; color:#4a463f; margin-top:6px; letter-spacing:.18em; text-transform:none; }
  body.open .hint{ opacity:.15; }

  .overlay{
    position:fixed; inset:0;
    background:rgba(5,4,4,.5);
    backdrop-filter:blur(2px);
    opacity:0; pointer-events:none;
    transition:opacity .5s ease;
    z-index:40;
  }
  body.open .overlay{ opacity:1; pointer-events:auto; }

  /* ---------- toggle ---------- */
  .toggle{
    position:fixed; top:28px; left:28px;
    width:58px; height:58px;
    border-radius:50%;
    background:var(--ink);
    border:4px solid var(--yellow);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:60;
    box-shadow:0 6px 18px rgba(0,0,0,.5);
    transition:transform .6s cubic-bezier(.16,1,.3,1), left .6s cubic-bezier(.16,1,.3,1);
  }
  .toggle:hover{ transform:scale(1.06); }
  .toggle:active{ transform:scale(.94); }
  body.open .toggle{
    left: calc(var(--panel-w) - 29px);
    transform:rotate(180deg);
  }
  @media (max-width:560px){
    body.open .toggle{ left: calc(92vw - 29px); }
  }
  .toggle .bars{ position:relative; width:22px; height:16px; }
  .toggle .bars span{
    position:absolute; left:0; width:100%; height:3px;
    background:var(--yellow); border-radius:2px;
    transition:transform .35s ease, opacity .25s ease, top .35s ease;
  }
  .toggle .bars span:nth-child(1){ top:0; }
  .toggle .bars span:nth-child(2){ top:6.5px; }
  .toggle .bars span:nth-child(3){ top:13px; }
  body.open .toggle .bars span:nth-child(1){ top:6.5px; transform:rotate(45deg); }
  body.open .toggle .bars span:nth-child(2){ opacity:0; }
  body.open .toggle .bars span:nth-child(3){ top:6.5px; transform:rotate(-45deg); }

  /* ---------- panel (wedge shape) ---------- */
  .panel{
    position:fixed; top:0; left:0;
    width:var(--panel-w);
    max-width:92vw;
    height:100vh;
    transform:translateX(-105%);
    transition:transform .65s cubic-bezier(.16,1,.3,1);
    z-index:50;
  }
  body.open .panel{ transform:translateX(0); }

  .panel-fill{
    position:absolute; inset:0;
    background:linear-gradient(200deg, var(--yellow-light) 0%, var(--yellow) 32%, var(--yellow) 100%);
    clip-path: polygon(0 0, calc(100% - var(--wedge)) 0, 100% 100%, 0 100%);
    box-shadow:-20px 0 60px rgba(0,0,0,.5);
    overflow:hidden;
  }

  /* animated diagonal shimmer */
  .shimmer{
    position:absolute;
    inset:-60%;
    width:220%; height:220%;
    background: repeating-linear-gradient(115deg,
      rgba(255,255,255,.28) 0 16px,
      rgba(255,255,255,0) 16px 46px);
    mix-blend-mode:overlay;
    animation: shimmerMove 11s linear infinite;
    pointer-events:none;
  }
  @keyframes shimmerMove{
    from{ transform:translate(0,0); }
    to{ transform:translate(-92px,64px); }
  }

  /* dotted diagonal seam */
  .seam{
    position:absolute;
    top:-2%; left:calc(100% - var(--wedge) - 3px);
    width:6px; height:104%;
    background-image: radial-gradient(circle, var(--ink) 2.6px, transparent 3px);
    background-size: 100% 15px;
    transform-origin: top left;
    transform: rotate(6.2deg);
    opacity:.85;
  }

  /* decorative sun */
  .sun{
    position:absolute; top:-90px; left:-70px;
    width:280px; height:280px;
    border-radius:50%;
    background:var(--yellow-light);
    opacity:.75;
    z-index:0;
    animation:float 7s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(14px); }
  }

  .tri{
    position:absolute;
    width:70px; height:70px;
    border:4px solid rgba(20,20,20,.18);
    transform:rotate(20deg);
    z-index:0;
  }
  .tri1{ bottom:22%; right:16%; width:46px; height:46px; transform:rotate(-12deg); }
  .tri2{ top:14%; right:38%; width:30px; height:30px; border-width:3px; transform:rotate(35deg); opacity:.6; }

  .dots{
    position:absolute; bottom:6%; right:10%;
    width:120px; height:90px;
    background-image: radial-gradient(rgba(20,20,20,.18) 2.4px, transparent 2.6px);
    background-size: 16px 16px;
    z-index:0;
  }

  .panel-content{
    position:relative;
    z-index:1;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding-right:calc(var(--wedge) + 44px);
    padding-left:36px;
    padding-bottom:74px;
    gap:20px;
  }

  .nav-item{
    display:block;
    font-family:'Fredoka', sans-serif;
    text-decoration:none;
    cursor:pointer;
    color:var(--ink);
    opacity:0;
    transform:translateX(30px);
    transition:opacity .5s cubic-bezier(.16,1,.3,1), transform .5s cubic-bezier(.16,1,.3,1),
               background .2s ease, padding .2s ease;
  }
  body.open .nav-item{ opacity:1; transform:none; }
  body.open .nav-item:nth-child(1){ transition-delay:.42s; }
  body.open .nav-item:nth-child(2){ transition-delay:.5s; }
  body.open .nav-item:nth-child(3){ transition-delay:.58s; }

  .nav-item.primary{
    background:var(--ink);
    color:var(--white);
    font-size:32px;
    font-weight:700;
    padding:16px 44px 16px calc(var(--wedge) + 44px);
    margin-right:calc(-1 * (var(--wedge) + 44px));
    margin-left:-36px;
  }
  .nav-item.primary:hover{ padding-right:56px; }

  .nav-item.secondary{
    font-size:22px;
    font-weight:600;
  }
  .nav-item.secondary:hover{ padding-right:12px; }

  .nav-item.tertiary{
    font-size:16px;
    font-weight:500;
    opacity:.85;
  }
  body.open .nav-item.tertiary{ opacity:.85; }
  .nav-item.tertiary:hover{ padding-right:12px; opacity:1 !important; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

  <div class="bg-lines"></div>
  <div class="hint">Sistema CMMS<span>Toca el botón para abrir el panel</span></div>
  <div class="overlay" data-close></div>

  <button class="toggle" id="toggleBtn" aria-label="Abrir menú" aria-expanded="false">
    <div class="bars"><span></span><span></span><span></span></div>
  </button>

  <aside class="panel" role="dialog" aria-label="Menú">
    <div class="panel-fill">
      <div class="shimmer"></div>
      <div class="sun"></div>
      <div class="tri tri1"></div>
      <div class="tri tri2"></div>
      <div class="dots"></div>
      <div class="seam"></div>
    </div>

    <div class="panel-content">
      <a class="nav-item primary">Continuar</a>
      <a class="nav-item secondary">Reiniciar orden</a>
      <a class="nav-item tertiary">Volver al panel principal</a>
    </div>
  </aside>

<script>
  const body = document.body;
  const btn = document.getElementById('toggleBtn');

  function setOpen(v){
    body.classList.toggle('open', v);
    btn.setAttribute('aria-expanded', v);
    btn.setAttribute('aria-label', v ? 'Cerrar menú' : 'Abrir menú');
  }

  btn.addEventListener('click', () => setOpen(!body.classList.contains('open')));
  document.querySelectorAll('[data-close]').forEach(el =>
    el.addEventListener('click', () => setOpen(false))
  );
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') setOpen(false);
  });
</script>
</body>
</html>
