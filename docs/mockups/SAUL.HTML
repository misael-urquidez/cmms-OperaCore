<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Botones Neumorphism - OperaCore CMMS</title>

    <link rel="stylesheet" href="hover3.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="contenedor">

    <h1>OperaCore CMMS</h1>

    <p class="subtitulo">
        Panel de acciones rápidas HUAPE ESTUVO AQUI
        AQUI
    </p>

    <div class="botones">

        <button class="neo">
            <i class="fa-solid fa-plus"></i>
            Nueva Orden
        </button>

        <button class="neo success">
            <i class="fa-solid fa-circle-check"></i>
            Finalizar
        </button>

        <button class="neo warning">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Pendiente
        </button>

        <button class="neo danger">
            <i class="fa-solid fa-trash"></i>
            Eliminar
        </button>

        <button class="neo info">
            <i class="fa-solid fa-chart-line"></i>
            Reportes
        </button>

        <button class="neo dark">
            <i class="fa-solid fa-gear"></i>
            Configuración
        </button>

    </div>

</div>

<div class="floating">

    <i class="fa-solid fa-plus"></i>

</div>

</body>

</html>
