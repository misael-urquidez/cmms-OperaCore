<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OperaCore CMMS</title>

    <link rel="stylesheet" href="styles.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <h2>OperaCore</h2>

    <ul>

        <li>
            <i class="fa-solid fa-house"></i>
            Dashboard
        </li>

        <li>
            <i class="fa-solid fa-gears"></i>
            Máquinas
        </li>

        <li>
            <i class="fa-solid fa-screwdriver-wrench"></i>
            Órdenes
        </li>

        <li>
            <i class="fa-solid fa-box"></i>
            Inventario
        </li>

        <li>
            <i class="fa-solid fa-chart-column"></i>
            Indicadores
        </li>

        <li>
            <i class="fa-solid fa-users"></i>
            Técnicos
        </li>

        <li>
            <i class="fa-solid fa-file-lines"></i>
            Reportes
        </li>

    </ul>

</div>


<div class="contenido">

    <header>

        <h1>Dashboard CMMS</h1>

        <button>
            Nueva Orden
        </button>

    </header>

    <section class="cards">

        <div class="card">
            <h2>120</h2>
            <p>Máquinas</p>
        </div>

        <div class="card">
            <h2>42</h2>
            <p>Órdenes Activas</p>
        </div>

        <div class="card">
            <h2>18</h2>
            <p>Técnicos</p>
        </div>

        <div class="card">
            <h2>96%</h2>
            <p>Disponibilidad</p>
        </div>

    </section>

</div>

</body>

</html>
