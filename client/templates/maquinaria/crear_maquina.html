<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OPERACORE | Registrar Nueva Máquina</title>
    <style>
        :root {
            --bg-main: #0f1115;
            --bg-card: #161920;
            --bg-info: #1f242e;
            --border-color: #2a313e;
            --accent: #00adb5;
            --text-main: #e3e8f0;
            --text-muted: #94a3b8;
            --transition: all 0.25s ease-in-out;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-main); }
        header { background-color: var(--bg-card); padding: 24px 40px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; color: #ffffff; font-size: 26px; }
        .container { padding: 40px; max-width: 900px; margin: 0 auto; }
        .form-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-control-custom { width: 100%; padding: 12px 16px; background-color: var(--bg-info); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-size: 14px; box-sizing: border-box; }
        .form-control-custom:focus { outline: none; border-color: var(--accent); }
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
        .btn-primary { background-color: var(--accent); color: var(--bg-main); padding: 12px 24px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 24px; border-radius: 6px; font-weight: 600; text-decoration: none; }
        
        /* Estilos adicionales para etiquetas de Django y campos de archivo */
        form p { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        form label { font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; }
        form input[type="file"] { padding: 8px; background-color: var(--bg-info); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>⚙ OPERACORE | Registro de Maquinaria</h1>
            <p style="margin: 4px 0 0 0; color: var(--text-muted); font-size: 13px;">Dar de alta un nuevo equipo SMT</p>
        </div>
        <div>
            <a class="btn-secondary" href="javascript:history.back()">&larr; Volver</a>
        </div>
    </header>
    <div class="container">
        <div class="form-card">
            <!-- Se agregó enctype="multipart/form-data" para permitir subir archivos e imágenes -->
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <a href="javascript:history.back()" class="btn-secondary">Cancelar</a>
                    <button type="submit" class="btn-primary">Guardar Máquina</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
