<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard CMMS</title>

    <link rel="stylesheet" href="hover2.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="contenedor">

    <h1>Panel de Indicadores</h1>

    <div class="cards">

        <div class="card">

            <div class="icono">
                <i class="fa-solid fa-gears"></i>
            </div>

            <h2>Máquinas</h2>

            <h3>128</h3>

            <p>Equipos registrados en el sistema.</p>

        </div>

        <div class="card">

            <div class="icono">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>

            <h2>Órdenes</h2>

            <h3>42</h3>

            <p>Mantenimientos actualmente activos.</p>

        </div>

        <div class="card">

            <div class="icono">
                <i class="fa-solid fa-boxes-stacked"></i>
            </div>

            <h2>Inventario</h2>

            <h3>2,415</h3>

            <p>Piezas y refacciones disponibles.</p>

        </div>

        <div class="card">

            <div class="icono">
                <i class="fa-solid fa-chart-line"></i>
            </div>

            <h2>Disponibilidad</h2>

            <h3>96%</h3>

            <p>Rendimiento general de la planta.</p>

        </div>

    </div>

</div>

</body>

</html>
