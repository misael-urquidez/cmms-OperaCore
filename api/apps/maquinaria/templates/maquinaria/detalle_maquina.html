{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERACORE 3D | Monitoreo de Activos</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #111827;
            --panel-bg-subtle: #1f2937;
            --accent-cyan: #00f0ff;
            --accent-cyan-glow: rgba(0, 240, 255, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --status-ok: #10b981;
            --status-ok-glow: rgba(16, 185, 129, 0.3);
        }

        body {
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            background: var(--bg-dark);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        /* FILA SUPERIOR: DISTRIBUCIÓN EN 3 COLUMNAS */
        .fila-superior {
            display: flex;
            flex: 1; 
            gap: 20px;
            min-height: 0; 
        }

        /* 1. Panel Lateral Izquierdo (Lista e Info) */
        #panel-info {
            width: 320px;
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .header-maquina {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .header-maquina h2 {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header-maquina h1 {
            color: var(--accent-cyan);
            margin: 8px 0 0 0;
            font-size: 1.6rem;
            font-weight: 700;
            text-shadow: 0 0 15px var(--accent-cyan-glow);
        }

        /* Listado de máquinas dinámico */
        #listaMaquinas {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .maquina {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .maquina:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.05);
        }

        .maquina h3 {
            margin: 0 0 6px 0;
            font-size: 1rem;
            color: var(--text-main);
        }

        .maquina p {
            margin: 2px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 2. Centro: Visor 3D */
        #canvas-container {
            flex: 1; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .visor-overlay {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: var(--text-muted);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        /* 3. Panel de Métricas Rápidas (Derecha) */
        .panel-lateral-derecho {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .kpi-compact-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kpi-compact-card .kpi-val {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-top: 4px;
        }

        /* FILA INFERIOR */
        .panel-inferior {
            height: 140px;
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            box-sizing: border-box;
        }

        .metrica-card {
            background: rgba(31, 41, 55, 0.4);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.25s ease;
        }

        .metrica-card:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.02);
            transform: translateY(-2px);
        }

        .metrica-titulo {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .metrica-valor {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="fila-superior">
        <div id="panel-info">
            <div class="header-maquina">
                <h2>Activo Seleccionado</h2>
                <h1 id="nombre">Selecciona un activo</h1>
                <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: var(--text-muted);" id="modelo-info">Modelo: -</p>
            </div>

            <div id="listaMaquinas">
                </div>
        </div>

        <div id="canvas-container">
            <div class="visor-overlay">🔍 Clic + arrastrar para rotar</div>
        </div>

        <div class="panel-lateral-derecho">
            <div class="kpi-compact-card">
                <div class="metrica-titulo">Rendimiento OEE</div>
                <div class="kpi-val">87.5%</div>
            </div>
            <div class="kpi-compact-card">
                <div class="metrica-titulo">Próximo Mtto.</div>
                <div class="kpi-val" style="font-size: 1.5rem; color: #f59e0b;">24 Jul 2026</div>
            </div>
        </div>
    </div>

    <div class="panel-inferior">
        <div class="metrica-card">
            <div class="metrica-titulo">Clasificación</div>
            <div class="metrica-valor" id="clasificacion">-</div>
        </div>
        <div class="metrica-card">
            <div class="metrica-titulo">Código de Registro</div>
            <div class="metrica-valor" id="codigo-registro">-</div>
        </div>
        <div class="metrica-card">
            <div class="metrica-titulo">Estado del Activo</div>
            <div class="metrica-valor" id="estado" style="color: var(--status-ok);">-</div>
        </div>
        <div class="metrica-card">
            <div class="metrica-titulo">Operario Asignado</div>
            <div class="metrica-valor">Juan P.</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // Variables globales de la escena de Three.js
        let scene, camera, renderer, controls;
        let modeloActual = null;
        let loader;

        const container = document.getElementById('canvas-container');

        // ==========================================
        // 1. INICIALIZAR LA ESCENA 3D
        // ==========================================
        function iniciarEscena() {
            scene = new THREE.Scene();

            // Usamos un fondo oscuro translúcido para mantener el degradado CSS del contenedor
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Ajustar cámara para que el espacio de visualización sea óptimo
            camera = new THREE.PerspectiveCamera(
                45, 
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 3, 8); 

            // OrbitControls asociados al contenedor del canvas
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2; // Impide rotar por debajo del suelo virtual

            // Iluminación Profesional de 3 Puntos
            scene.add(new THREE.HemisphereLight(0xffffff, 0x1e293b, 1.8));

            let mainLight = new THREE.DirectionalLight(0xffffff, 2.0);
            mainLight.position.set(5, 8, 5);
            scene.add(mainLight);

            let rimLight = new THREE.DirectionalLight(0x00f0ff, 1.5);
            rimLight.position.set(-5, 4, -5);
            scene.add(rimLight);

            // Grid Industrial de referencia en la base
            let grid = new THREE.GridHelper(20, 20, 0x00f0ff, 0x1f2937);
            grid.position.y = -1;
            scene.add(grid);

            loader = new THREE.GLTFLoader();
        }

        // ==========================================
        // 2. CONTROLADOR DE CARGA DE MODELOS .GLB/.GLTF
        // ==========================================
        function cargarModelo(rutaRelativa) {
            if (!rutaRelativa) return;

            // Limpiar escena de modelos previos
            if (modeloActual) {
                scene.remove(modeloActual);
                modeloActual = null;
            }

            // RESOLVER RUTA DINÁMICA:
            // Dado que las querys de SQL apuntan a "images/archivo.glb",
            // concatenamos de forma segura el prefijo estático "/static/"
            let rutaCompleta = "/static/" + rutaRelativa;

            console.log("Cargando activo 3D desde ruta unificada:", rutaCompleta);

            loader.load(
                rutaCompleta,
                function (gltf) {
                    modeloActual = gltf.scene;
                    
                    // Escalar y posicionar el modelo de manera óptima
                    modeloActual.scale.set(1.5, 1.5, 1.5); 
                    modeloActual.position.set(0, -0.5, 0); 
                    
                    // Habilitar sombras en todos los meshes del modelo
                    modeloActual.traverse(function (node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });

                    scene.add(modeloActual);
                    
                    // Ajustar automáticamente la cámara al centro y tamaño del nuevo modelo
                    const box = new THREE.Box3().setFromObject(modeloActual);
                    const center = box.getCenter(new THREE.Vector3());
                    controls.target.copy(center);
                },
                undefined,
                function (error) {
                    console.error("Error al renderizar el modelo en: " + rutaCompleta, error);
                }
            );
        }

        // ==========================================
        // 3. CONSULTAR API DJANGO Y GENERAR LISTA
        // ==========================================
        function cargarMaquinas() {
            fetch("/maquinaria/api/v1/list/")
                .then(response => response.json())
                .then(data => {
                    let lista = document.getElementById("listaMaquinas");
                    lista.innerHTML = "";

                    data.forEach((maquina, index) => {
                        let card = document.createElement("div");
                        card.className = "maquina";
                        card.innerHTML = `
                            <h3>${maquina.nombre}</h3>
                            <p>Código: ${maquina.codigo}</p>
                            <p>Modelo: ${maquina.modelo}</p>
                        `;

                        // Evento click para actualizar la interfaz y cargar el modelo correspondiente
                        card.onclick = function () {
                            document.getElementById("nombre").innerText = maquina.nombre;
                            document.getElementById("modelo-info").innerText = "Modelo: " + maquina.modelo;
                            document.getElementById("clasificacion").innerText = maquina.tipo_maquina?.nombre || "Sin Clasificar";
                            document.getElementById("codigo-registro").innerText = maquina.codigo;
                            document.getElementById("estado").innerText = maquina.estado_maquina?.nombre || "OPERATIVO";

                            if (maquina.modelo_3d) {
                                cargarModelo(maquina.modelo_3d);
                            }
                        };

                        lista.appendChild(card);

                        // Cargar por defecto la primera máquina de la lista en el visor
                        if (index === 0) {
                            card.click();
                        }
                    });
                })
                .catch(error => {
                    console.error("Error al consultar API OPERACORE:", error);
                });
        }

        // ==========================================
        // 4. ANIMACIÓN DE LA ESCENA
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Rotación sutil y constante del activo industrial
            if (modeloActual) {
                modeloActual.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        // Ajuste responsivo del canvas de visualización
        window.addEventListener("resize", () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Inicialización
        iniciarEscena();
        cargarMaquinas();
        animate();
    </script>
</body>
</html>
