<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            text-align: center;
            color: white;
            margin-top: 50px;
        }

        h1{
            font-size: 40px;
            text-shadow: 2px 2px 5px black;
        }

        h2{
            font-size: 25px;
        }

        img{
            width: 300px;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s;
        }

        img:hover{
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <h2>Hola</h2>
    <h1>HTML de LUIS</h1>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfOMwm6o_JEouET2UZRTU71dN7vpj1C81nww&s"
         alt="troleador_cara">
</body>
</html>
